# OpenClaw Agents — Beast Deployment Compose
# Tracks the live compose at /opt/amplified/apps/openclaw-agents/docker-compose.yml
#
# Ports bound to 127.0.0.1 — matches live state applied 2026-05-09 (AMP-289).
# External access via Traefik or Tailscale only.
#
# Usage:
#   docker compose up -d
#
# Prerequisites:
#   - amplified-net Docker network exists
#   - Agent platform image built locally or pulled
#
# Signed-by: Devon-bb9c | 2026-05-09 | devin-bb9c2942d13c40ba8842b1117f72efda

services:
  openclaw-agents:
    build: .
    container_name: openclaw-agents
    restart: unless-stopped
    environment:
      PORT: "8100"
    ports:
      - "127.0.0.1:8100:8100"
    networks:
      - amplified-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  amplified-net:
    external: true
